name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [web, net, wifi, mobile, ad]
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile.${{ matrix.variant }}
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.${{ matrix.variant }}
          failure-threshold: error
          ignore: DL3003,DL3006,DL3008,DL3013,DL3016,DL3018,DL3028,DL4006,SC2015,SC2086

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        variant: [web, net, wifi, mobile, ad]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.variant }}
          push: false
          load: true
          tags: ghostwire:${{ matrix.variant }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test ${{ matrix.variant }}
        run: |
          docker run --rm ghostwire:${{ matrix.variant }} smoke-test ${{ matrix.variant }}

      - name: Image size
        run: |
          docker images ghostwire:${{ matrix.variant }} --format '{{.Repository}}:{{.Tag}} {{.Size}}'
