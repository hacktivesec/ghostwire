name: ghostwire

x-common: &common
  restart: unless-stopped
  env_file: [.env]
  volumes:
    - ./:/work
    - ./artifacts:/shared
  tty: true
  stdin_open: true

services:
  web:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ghostwire-web
    environment:
      GHOST_LABEL: web

  net:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile.net
    container_name: ghostwire-net
    environment:
      GHOST_LABEL: network

  wifi:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile.wifi
    container_name: ghostwire-wifi
    cap_add: ["NET_RAW", "NET_ADMIN"]
    environment:
      GHOST_LABEL: wifi

  mobile:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile.mobile
    container_name: ghostwire-mobile
    environment:
      GHOST_LABEL: mobile

  ad:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile.ad
    container_name: ghostwire-ad
    environment:
      GHOST_LABEL: ad

  total:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile.total
    container_name: ghostwire
    environment:
      GHOST_LABEL: security
      SOCKS5_HOST: ${SOCKS5_HOST:-host.docker.internal}
      SOCKS5_PORT: ${SOCKS5_PORT:-1080}
    # GPU (optional):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
